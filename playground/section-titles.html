<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Section Titles — 50 Styles</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1040 0%,#2d1b69 30%,#1e3a5f 70%,#0d4f4f 100%);color:#f1f5f9;min-height:100vh;padding:32px}
h1{font-size:20px;font-weight:800;margin-bottom:6px;opacity:.9}
.sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:12px}
.card-num{font-size:10px;font-weight:800;color:#f59e0b;letter-spacing:.08em;opacity:.6}
.card-items{display:flex;flex-direction:column;gap:6px}
.item{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:500;color:rgba(255,255,255,.7)}

/* ─── 1. Clean white ─── */
.s1{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;padding-bottom:6px;border-bottom:2px solid rgba(255,255,255,.3)}
/* ─── 2. Amber accent ─── */
.s2{font-size:11px;font-weight:800;color:#f59e0b;text-transform:uppercase;letter-spacing:.1em;padding-bottom:6px;border-bottom:2px solid rgba(245,158,11,.4)}
/* ─── 3. Pill badge ─── */
.s3{display:inline-block;font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px}
/* ─── 4. Amber pill ─── */
.s4{display:inline-block;font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;background:rgba(245,158,11,.25);padding:5px 14px;border-radius:20px;border:1px solid rgba(245,158,11,.4)}
/* ─── 5. Left bar thick ─── */
.s5{font-size:12px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.08em;padding-left:14px;border-left:4px solid #f59e0b}
/* ─── 6. Left bar thin ─── */
.s6{font-size:11px;font-weight:700;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.1em;padding-left:12px;border-left:2px solid rgba(255,255,255,.3)}
/* ─── 7. Gradient underline ─── */
.s7{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;padding-bottom:8px;border-bottom:2px solid transparent;border-image:linear-gradient(90deg,#f59e0b,transparent) 1}
/* ─── 8. Full width bg ─── */
.s8{font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.12em;background:rgba(255,255,255,.08);padding:8px 14px;border-radius:8px}
/* ─── 9. Glass bg ─── */
.s9{font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.12em;background:rgba(255,255,255,.06);backdrop-filter:blur(12px);padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1)}
/* ─── 10. Dot prefix ─── */
.s10::before{content:'●';color:#f59e0b;margin-right:8px;font-size:8px;vertical-align:middle}
.s10{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em}
/* ─── 11. Double line ─── */
.s11{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;padding-bottom:8px;border-bottom:3px double rgba(255,255,255,.25)}
/* ─── 12. Dashed underline ─── */
.s12{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;padding-bottom:6px;border-bottom:2px dashed rgba(255,255,255,.2)}
/* ─── 13. Neon glow ─── */
.s13{font-size:12px;font-weight:800;color:#f59e0b;text-transform:uppercase;letter-spacing:.1em;text-shadow:0 0 8px rgba(245,158,11,.5),0 0 20px rgba(245,158,11,.2)}
/* ─── 14. Subtle italic ─── */
.s14{font-size:13px;font-weight:600;color:rgba(255,255,255,.6);font-style:italic;letter-spacing:.04em}
/* ─── 15. Big & bold ─── */
.s15{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.01em;opacity:.85}
/* ─── 16. Tiny muted ─── */
.s16{font-size:9px;font-weight:800;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.2em}
/* ─── 17. Tag chip ─── */
.s17{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:.06em;background:rgba(245,158,11,.1);padding:4px 12px;border-radius:6px;border:1px solid rgba(245,158,11,.25)}
/* ─── 18. Slash prefix ─── */
.s18::before{content:'//';color:rgba(255,255,255,.2);margin-right:8px;font-weight:400}
.s18{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.08em}
/* ─── 19. Arrow prefix ─── */
.s19::before{content:'▸';color:#f59e0b;margin-right:8px;font-size:12px}
.s19{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em}
/* ─── 20. Hash prefix ─── */
.s20::before{content:'#';color:rgba(245,158,11,.6);margin-right:4px;font-size:13px;font-weight:900}
.s20{font-size:12px;font-weight:700;color:#fff;letter-spacing:.04em}
/* ─── 21. Bracket wrap ─── */
.s21::before{content:'[';color:rgba(255,255,255,.2);margin-right:4px}
.s21::after{content:']';color:rgba(255,255,255,.2);margin-left:4px}
.s21{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em;font-family:'SF Mono',Monaco,monospace}
/* ─── 22. Monospace ─── */
.s22{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.12em;font-family:'SF Mono',Monaco,monospace}
/* ─── 23. Gradient text ─── */
.s23{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;background:linear-gradient(90deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
/* ─── 24. Gradient text cool ─── */
.s24{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;background:linear-gradient(90deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
/* ─── 25. Underline offset ─── */
.s25{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;text-decoration:underline;text-underline-offset:6px;text-decoration-color:rgba(245,158,11,.4);text-decoration-thickness:2px}
/* ─── 26. Strikethrough accent ─── */
.s26{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;position:relative}
.s26::after{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(245,158,11,.4)}
/* ─── 27. Circle bullet ─── */
.s27::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;border:2px solid #f59e0b;margin-right:10px;vertical-align:middle}
.s27{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em}
/* ─── 28. Filled circle ─── */
.s28::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;margin-right:10px;vertical-align:middle}
.s28{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em}
/* ─── 29. Diamond prefix ─── */
.s29::before{content:'◆';color:#f59e0b;margin-right:8px;font-size:8px;vertical-align:middle}
.s29{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em}
/* ─── 30. Line through text ─── */
.s30{display:flex;align-items:center;gap:12px;font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em}
.s30::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.15)}
/* ─── 31. Lines both sides ─── */
.s31{display:flex;align-items:center;gap:12px;font-size:10px;font-weight:800;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.14em}
.s31::before,.s31::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.12)}
/* ─── 32. Amber left + line ─── */
.s32{display:flex;align-items:center;gap:12px;font-size:11px;font-weight:800;color:#f59e0b;text-transform:uppercase;letter-spacing:.1em}
.s32::after{content:'';flex:1;height:1px;background:rgba(245,158,11,.2)}
/* ─── 33. Bottom shadow ─── */
.s33{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;padding-bottom:10px;box-shadow:0 4px 8px -4px rgba(245,158,11,.3)}
/* ─── 34. Top border ─── */
.s34{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;padding-top:8px;border-top:2px solid rgba(255,255,255,.15)}
/* ─── 35. Badge + count ─── */
.s35{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.08em}
.s35::after{content:'4';font-size:9px;background:rgba(255,255,255,.15);padding:2px 7px;border-radius:10px;font-weight:700;color:rgba(255,255,255,.5)}
/* ─── 36. Emoji prefix ─── */
.s36::before{content:'📌';margin-right:8px;font-size:12px}
.s36{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em}
/* ─── 37. Wavy underline ─── */
.s37{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;text-decoration:underline wavy;text-underline-offset:5px;text-decoration-color:rgba(245,158,11,.35);text-decoration-thickness:1px}
/* ─── 38. Stencil / outline text ─── */
.s38{font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,.4)}
/* ─── 39. Rotated accent ─── */
.s39::before{content:'';display:inline-block;width:12px;height:3px;background:#f59e0b;margin-right:10px;vertical-align:middle;transform:rotate(-20deg);border-radius:2px}
.s39{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em}
/* ─── 40. Block quote style ─── */
.s40{font-size:12px;font-weight:700;color:rgba(255,255,255,.7);padding:6px 14px;border-left:3px solid rgba(255,255,255,.2);background:rgba(255,255,255,.03);border-radius:0 6px 6px 0}
/* ─── 41. Highlight marker ─── */
.s41{display:inline;font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.08em;background:linear-gradient(transparent 55%,rgba(245,158,11,.3) 55%);padding:0 4px}
/* ─── 42. Stamp style ─── */
.s42{display:inline-block;font-size:10px;font-weight:900;color:#f59e0b;text-transform:uppercase;letter-spacing:.15em;border:2px solid #f59e0b;padding:3px 12px;transform:rotate(-2deg);opacity:.8}
/* ─── 43. Glitch shadow ─── */
.s43{font-size:12px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:.08em;text-shadow:2px 0 #f59e0b,-2px 0 #3b82f6;opacity:.8}
/* ─── 44. Fade right ─── */
.s44{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;mask-image:linear-gradient(90deg,#fff 70%,transparent);-webkit-mask-image:linear-gradient(90deg,#fff 70%,transparent)}
/* ─── 45. Condensed caps ─── */
.s45{font-size:14px;font-weight:900;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:-.02em;font-stretch:condensed}
/* ─── 46. Spaced out ─── */
.s46{font-size:9px;font-weight:800;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.35em}
/* ─── 47. Amber bg full ─── */
.s47{font-size:10px;font-weight:800;color:#000;text-transform:uppercase;letter-spacing:.1em;background:#f59e0b;padding:6px 14px;border-radius:6px}
/* ─── 48. Frosted bar ─── */
.s48{font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.12em;background:rgba(255,255,255,.08);backdrop-filter:blur(16px);padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.1);box-shadow:0 2px 12px rgba(0,0,0,.15)}
/* ─── 49. Minimal dash ─── */
.s49::before{content:'—';color:rgba(255,255,255,.2);margin-right:10px;font-weight:300}
.s49{font-size:11px;font-weight:700;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.08em}
/* ─── 50. Fire gradient ─── */
.s50{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;background:linear-gradient(90deg,#f59e0b,#ef4444,#f59e0b);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fireShift 3s linear infinite}
@keyframes fireShift{0%{background-position:0% center}100%{background-position:200% center}}
</style>
</head>
<body>

<h1>Section Titles — 50 Styles</h1>
<p class="sub">Chaque carte montre un style de titre avec des items dessous pour le contexte.</p>

<div class="grid" id="grid"></div>

<script>
const TITLES = ['Aujourd\'hui','Quotidien','Personnel','Travail','Urgent','Courses'];
const grid = document.getElementById('grid');
for (let i = 1; i <= 50; i++) {
  const title = TITLES[i % TITLES.length];
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-num">#${String(i).padStart(2,'0')}</div>
    <div class="s${i}">${title}</div>
    <div class="card-items">
      <div class="item">Répondre aux emails</div>
      <div class="item">Revue de code PR #42</div>
      <div class="item">Déployer en staging</div>
    </div>
  `;
  grid.appendChild(card);
}
</script>
<script src="huge-nav.js"></script>
</body>
</html>
