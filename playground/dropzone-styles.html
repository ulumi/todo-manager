<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropzone Styles — 10 options</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1040 0%, #2d1b69 30%, #1e3a5f 70%, #0d4f4f 100%);
    color: #f1f5f9;
    min-height: 100vh;
    padding: 32px;
  }
  h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; opacity: .9; }
  .subtitle { font-size: 13px; color: rgba(255,255,255,.45); margin-bottom: 28px; }
  .playground { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  @media (min-width: 1400px) { .playground { grid-template-columns: repeat(3, 1fr); } }
  .option { display: flex; flex-direction: column; gap: 12px; }
  .option-header { display: flex; align-items: baseline; gap: 8px; }
  .option-num {
    font-size: 11px; font-weight: 800; color: #f59e0b;
    background: rgba(245,158,11,.15); border-radius: 6px;
    padding: 2px 7px; letter-spacing: .05em;
  }
  .option-title {
    font-size: 13px; font-weight: 700; color: rgba(255,255,255,.8);
  }
  .option-desc { font-size: 11px; color: rgba(255,255,255,.4); line-height: 1.4; }
  .demo-list {
    display: flex; flex-direction: column;
    gap: 8px; min-height: 260px;
  }
  .demo-item {
    background: rgba(255,255,255,.08);
    border: 1.5px solid rgba(255,255,255,.12);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    cursor: grab; user-select: none;
    position: relative;
    transition: opacity .15s;
  }
  .demo-item:active { cursor: grabbing; }
  .demo-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .demo-item .text { font-size: 13px; font-weight: 500; flex: 1; }
  .demo-item .handle { color: rgba(255,255,255,.2); font-size: 12px; }
  .demo-item.dragging { opacity: .25; }

  /* ─── Shared placeholder base ─── */
  .drop-gap {
    height: 0; overflow: hidden; flex-shrink: 0;
    pointer-events: none; opacity: 0;
    transition: height .2s cubic-bezier(.2,1,.3,1), opacity .15s;
    border-radius: 10px;
  }
  .drop-gap.visible { opacity: 1; }

  /* ─── 1. Dashed orange (current) ─── */
  .style-1 .drop-gap {
    background: rgba(245, 158, 11, .06);
    border: 2px dashed rgba(245, 158, 11, .25);
  }

  /* ─── 2. Solid orange glow ─── */
  .style-2 .drop-gap {
    background: rgba(245, 158, 11, .12);
    border: 2px solid rgba(245, 158, 11, .5);
    box-shadow: 0 0 16px rgba(245, 158, 11, .2), inset 0 0 12px rgba(245, 158, 11, .08);
  }

  /* ─── 3. Bright orange fill ─── */
  .style-3 .drop-gap {
    background: rgba(245, 158, 11, .2);
    border: 2px solid rgba(245, 158, 11, .6);
  }

  /* ─── 4. Orange gradient pulse ─── */
  .style-4 .drop-gap {
    background: linear-gradient(90deg, rgba(245,158,11,.04), rgba(245,158,11,.18), rgba(245,158,11,.04));
    border: 2px dashed rgba(245, 158, 11, .4);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ─── 5. White ghost ─── */
  .style-5 .drop-gap {
    background: rgba(255, 255, 255, .06);
    border: 2px dashed rgba(255, 255, 255, .2);
  }

  /* ─── 6. Orange left bar ─── */
  .style-6 .drop-gap {
    background: rgba(245, 158, 11, .08);
    border: none;
    border-left: 4px solid #f59e0b;
    border-radius: 0 10px 10px 0;
  }

  /* ─── 7. Neon outline ─── */
  .style-7 .drop-gap {
    background: transparent;
    border: 2px solid #f59e0b;
    box-shadow: 0 0 8px rgba(245,158,11,.35), 0 0 20px rgba(245,158,11,.15);
  }

  /* ─── 8. Dotted bright + label ─── */
  .style-8 .drop-gap {
    background: rgba(245, 158, 11, .1);
    border: 2.5px dotted rgba(245, 158, 11, .55);
    display: flex; align-items: center; justify-content: center;
  }
  .style-8 .drop-gap::after {
    content: 'Déposer ici';
    font-size: 11px; font-weight: 700; color: rgba(245,158,11,.6);
    letter-spacing: .06em; text-transform: uppercase;
  }

  /* ─── 9. Glass orange ─── */
  .style-9 .drop-gap {
    background: rgba(245, 158, 11, .1);
    border: 1.5px solid rgba(245, 158, 11, .3);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
  }

  /* ─── 10. Breathing orange ─── */
  .style-10 .drop-gap {
    background: rgba(245, 158, 11, .12);
    border: 2px solid rgba(245, 158, 11, .45);
    animation: breathe 1s ease-in-out infinite alternate;
  }
  @keyframes breathe {
    0%   { border-color: rgba(245,158,11,.3); background: rgba(245,158,11,.08); }
    100% { border-color: rgba(245,158,11,.6); background: rgba(245,158,11,.18); }
  }
</style>
</head>
<body>

<h1>Dropzone Styles</h1>
<p class="subtitle">Drag les items pour voir chaque style. Le ghost simplifié suit la souris.</p>

<div class="playground" id="playground"></div>

<script>
const ITEMS = [
  { title: 'Répondre aux emails', color: '#ef4444' },
  { title: 'Revue de code PR #42', color: '#f59e0b' },
  { title: 'Déployer en staging', color: '#3b82f6' },
  { title: 'Rédiger la doc API', color: '#8b5cf6' },
  { title: 'Corriger le bug #127', color: '#10b981' },
];

const OPTIONS = [
  { id: 1,  title: 'Dashed subtle',     desc: 'Actuel — dashed orange très léger' },
  { id: 2,  title: 'Solid glow',        desc: 'Bordure solide + halo lumineux orange' },
  { id: 3,  title: 'Bright fill',       desc: 'Fond orange bien visible, bordure solide' },
  { id: 4,  title: 'Gradient pulse',    desc: 'Shimmer animé qui traverse la zone' },
  { id: 5,  title: 'White ghost',       desc: 'Neutre blanc — discret mais lisible' },
  { id: 6,  title: 'Left bar',          desc: 'Barre orange à gauche, fond léger' },
  { id: 7,  title: 'Neon outline',      desc: 'Outline orange brillant + glow' },
  { id: 8,  title: 'Dotted + label',    desc: 'Pointillé vif avec texte "Déposer ici"' },
  { id: 9,  title: 'Glass orange',      desc: 'Glassmorphism avec teinte orange' },
  { id: 10, title: 'Breathing',         desc: 'Bordure et fond qui pulsent doucement' },
];

const playground = document.getElementById('playground');

OPTIONS.forEach(opt => {
  const col = document.createElement('div');
  col.className = `option style-${opt.id}`;
  col.innerHTML = `
    <div class="option-header">
      <span class="option-num">${opt.id}</span>
      <span class="option-title">${opt.title}</span>
    </div>
    <div class="option-desc">${opt.desc}</div>
    <div class="demo-list" data-style="${opt.id}"></div>
  `;
  playground.appendChild(col);

  const list = col.querySelector('.demo-list');
  ITEMS.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'demo-item';
    el.draggable = true;
    el.dataset.idx = i;
    el.innerHTML = `<span class="handle">⠿</span><span class="dot" style="background:${item.color}"></span><span class="text">${item.title}</span>`;
    list.appendChild(el);
  });

  // Drag logic
  let draggedEl = null;
  let draggedH = 0;
  const ph = document.createElement('div');
  ph.className = 'drop-gap';

  const removePh = () => {
    ph.style.height = '0px';
    ph.classList.remove('visible');
    requestAnimationFrame(() => { if (ph.parentNode) ph.remove(); });
  };

  // Ghost
  let ghost = null;

  list.addEventListener('dragstart', e => {
    const item = e.target.closest('.demo-item');
    if (!item) return;
    draggedEl = item;
    draggedH = item.offsetHeight;
    e.dataTransfer.effectAllowed = 'move';

    // Simplified ghost
    ghost = document.createElement('div');
    ghost.style.cssText = 'position:fixed;left:-999px;top:-999px;padding:6px 14px;background:rgba(245,158,11,.9);color:#fff;font-size:12px;font-weight:700;border-radius:8px;white-space:nowrap;pointer-events:none;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.3);';
    ghost.textContent = item.querySelector('.text').textContent;
    document.body.appendChild(ghost);
    e.dataTransfer.setDragImage(ghost, 12, 12);
    requestAnimationFrame(() => {
      item.classList.add('dragging');
      if (ghost) ghost.remove();
      ghost = null;
    });
  });

  list.addEventListener('dragover', e => {
    e.preventDefault();
    if (!draggedEl) return;
    const target = e.target.closest('.demo-item');
    if (!target || target === draggedEl) return;
    const rect = target.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    if (before) target.parentNode.insertBefore(ph, target);
    else target.parentNode.insertBefore(ph, target.nextSibling);
    requestAnimationFrame(() => {
      ph.style.height = draggedH + 'px';
      ph.classList.add('visible');
    });
  });

  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) removePh();
  });

  list.addEventListener('dragend', () => {
    if (draggedEl) {
      draggedEl.classList.remove('dragging');
      if (ph.parentNode) {
        ph.parentNode.insertBefore(draggedEl, ph);
      }
    }
    removePh();
    draggedEl = null;
  });
});
</script>
<script src="huge-nav.js"></script>
</body>
</html>
