<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag & Drop Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1040 0%, #2d1b69 30%, #1e3a5f 70%, #0d4f4f 100%);
    color: #f1f5f9;
    min-height: 100vh;
    padding: 40px;
  }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 32px; opacity: .9; }
  .playground { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 40px; }
  .option { display: flex; flex-direction: column; gap: 16px; }
  .option-title {
    font-size: 13px; font-weight: 800; text-transform: uppercase;
    letter-spacing: .1em; color: #f59e0b; padding-bottom: 8px;
    border-bottom: 2px solid rgba(245,158,11,.3);
  }
  .option-desc { font-size: 12px; color: rgba(255,255,255,.5); line-height: 1.5; }
  .demo-list {
    display: flex; flex-direction: column;
    gap: 8px; min-height: 300px;
  }
  .demo-item {
    background: rgba(255,255,255,.08);
    border: 1.5px solid rgba(255,255,255,.12);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    cursor: grab;
    transition: opacity .15s, transform .15s, box-shadow .15s;
    user-select: none;
    position: relative;
  }
  .demo-item:active { cursor: grabbing; }
  .demo-item .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .demo-item .text { font-size: 14px; font-weight: 500; flex: 1; }
  .demo-item .handle {
    color: rgba(255,255,255,.2); font-size: 14px; cursor: grab;
  }
  .demo-item.dragging { opacity: .3; }

  /* ─── Option 1: Gap animé ─── */
  .demo-list.gap-mode {
    transition: none;
  }
  .gap-mode .demo-item {
    transition: transform .2s cubic-bezier(.2,1,.3,1), opacity .15s;
  }
  .gap-placeholder {
    height: 0;
    transition: height .2s cubic-bezier(.2,1,.3,1), opacity .15s;
    border-radius: 10px;
    background: rgba(245,158,11,.06);
    border: 2px dashed rgba(245,158,11,.25);
    opacity: 0;
    overflow: hidden;
    flex-shrink: 0;
  }
  .gap-placeholder.visible {
    opacity: 1;
  }

  /* ─── Option 2: Flèche orange ─── */
  .arrow-indicator {
    position: absolute;
    left: -20px;
    width: 14px; height: 14px;
    color: #f59e0b;
    font-size: 16px;
    font-weight: 900;
    line-height: 1;
    pointer-events: none;
    transition: top .1s ease, opacity .1s;
    display: none;
    z-index: 10;
    filter: drop-shadow(0 0 4px rgba(245,158,11,.5));
  }
  .arrow-indicator svg { width: 14px; height: 14px; }
  .arrow-line {
    position: absolute;
    left: -6px; right: 0;
    height: 2px;
    background: #f59e0b;
    border-radius: 1px;
    pointer-events: none;
    display: none;
    z-index: 9;
    box-shadow: 0 0 6px rgba(245,158,11,.4);
  }

  /* ─── Option 3: Ghost preview ─── */
  .ghost-preview {
    position: absolute;
    left: 0; right: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: top .15s cubic-bezier(.2,1,.3,1), opacity .1s;
  }
  .ghost-preview.visible { opacity: .5; }
  .ghost-preview .demo-item {
    border-color: rgba(245,158,11,.4);
    background: rgba(245,158,11,.08);
    box-shadow: 0 0 12px rgba(245,158,11,.15);
    cursor: default;
  }
</style>
</head>
<body>

<h1>Drag & Drop — Comparaison des 3 feedbacks</h1>

<div class="playground">

  <!-- Option 1: Gap animé -->
  <div class="option">
    <div class="option-title">① Gap animé</div>
    <div class="option-desc">Un espace s'ouvre là où l'item sera déposé. Pattern Notion/Trello.</div>
    <div class="demo-list gap-mode" id="list1"></div>
  </div>

  <!-- Option 2: Flèche orange -->
  <div class="option">
    <div class="option-title">② Flèche orange</div>
    <div class="option-desc">Petite flèche + ligne orange au point d'insertion.</div>
    <div class="demo-list" id="list2" style="position:relative">
      <div class="arrow-indicator" id="arrow2">
        <svg viewBox="0 0 14 14" fill="#f59e0b"><polygon points="0,2 14,7 0,12"/></svg>
      </div>
      <div class="arrow-line" id="arrowLine2"></div>
    </div>
  </div>

  <!-- Option 3: Ghost preview -->
  <div class="option">
    <div class="option-title">③ Ghost preview</div>
    <div class="option-desc">L'item apparaît en semi-transparent à sa future position.</div>
    <div class="demo-list" id="list3" style="position:relative">
      <div class="ghost-preview" id="ghost3"></div>
    </div>
  </div>

</div>

<script>
const ITEMS = [
  { title: 'Répondre aux emails', color: '#ef4444' },
  { title: 'Revue de code PR #42', color: '#f59e0b' },
  { title: 'Déployer en staging', color: '#3b82f6' },
  { title: 'Rédiger la doc API', color: '#8b5cf6' },
  { title: 'Appeler le client', color: '#10b981' },
  { title: 'Corriger le bug #127', color: '#ef4444' },
];

function createItem(item, idx) {
  const el = document.createElement('div');
  el.className = 'demo-item';
  el.draggable = true;
  el.dataset.idx = idx;
  el.innerHTML = `<span class="handle">⠿</span><span class="dot" style="background:${item.color}"></span><span class="text">${item.title}</span>`;
  return el;
}

function populate(listEl, items) {
  items.forEach((item, i) => listEl.appendChild(createItem(item, i)));
}

// ─── Option 1: Gap animé ──────────────────────────────
(() => {
  const list = document.getElementById('list1');
  populate(list, ITEMS);

  let draggedEl = null;
  let placeholder = null;

  list.addEventListener('dragstart', e => {
    const item = e.target.closest('.demo-item');
    if (!item) return;
    draggedEl = item;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setDragImage(new Image(), 0, 0); // hide default ghost
    requestAnimationFrame(() => item.classList.add('dragging'));

    // Create placeholder
    placeholder = document.createElement('div');
    placeholder.className = 'gap-placeholder';
    placeholder.style.height = '0px';
  });

  list.addEventListener('dragover', e => {
    e.preventDefault();
    if (!draggedEl) return;

    const target = e.target.closest('.demo-item');
    if (!target || target === draggedEl) return;

    const rect = target.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    const h = draggedEl.offsetHeight;

    // Remove existing placeholder
    if (placeholder.parentNode) placeholder.remove();

    if (before) {
      target.parentNode.insertBefore(placeholder, target);
    } else {
      target.parentNode.insertBefore(placeholder, target.nextSibling);
    }

    requestAnimationFrame(() => {
      placeholder.style.height = h + 'px';
      placeholder.classList.add('visible');
    });
  });

  list.addEventListener('dragend', () => {
    if (draggedEl) draggedEl.classList.remove('dragging');
    if (placeholder && placeholder.parentNode) {
      // Move the item to placeholder position
      placeholder.parentNode.insertBefore(draggedEl, placeholder);
      placeholder.remove();
    }
    draggedEl = null;
    placeholder = null;
  });

  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget) && placeholder && placeholder.parentNode) {
      placeholder.style.height = '0px';
      placeholder.classList.remove('visible');
    }
  });
})();

// ─── Option 2: Flèche orange ──────────────────────────
(() => {
  const list = document.getElementById('list2');
  const arrow = document.getElementById('arrow2');
  const line = document.getElementById('arrowLine2');
  populate(list, ITEMS);

  let draggedEl = null;

  list.addEventListener('dragstart', e => {
    const item = e.target.closest('.demo-item');
    if (!item) return;
    draggedEl = item;
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => item.classList.add('dragging'));
  });

  list.addEventListener('dragover', e => {
    e.preventDefault();
    if (!draggedEl) return;

    const target = e.target.closest('.demo-item');
    if (!target || target === draggedEl) return;

    const rect = target.getBoundingClientRect();
    const listRect = list.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    const y = before ? rect.top - listRect.top - 1 : rect.bottom - listRect.top - 1;

    arrow.style.display = 'block';
    arrow.style.top = (y - 7) + 'px';
    line.style.display = 'block';
    line.style.top = y + 'px';
  });

  list.addEventListener('dragend', () => {
    if (draggedEl) draggedEl.classList.remove('dragging');
    arrow.style.display = 'none';
    line.style.display = 'none';
    draggedEl = null;
  });

  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) {
      arrow.style.display = 'none';
      line.style.display = 'none';
    }
  });
})();

// ─── Option 3: Ghost preview ──────────────────────────
(() => {
  const list = document.getElementById('list3');
  const ghost = document.getElementById('ghost3');
  populate(list, ITEMS);

  let draggedEl = null;

  list.addEventListener('dragstart', e => {
    const item = e.target.closest('.demo-item');
    if (!item) return;
    draggedEl = item;
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => item.classList.add('dragging'));
  });

  list.addEventListener('dragover', e => {
    e.preventDefault();
    if (!draggedEl) return;

    const target = e.target.closest('.demo-item');
    if (!target || target === draggedEl) return;

    const rect = target.getBoundingClientRect();
    const listRect = list.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;

    // Position ghost
    const y = before ? rect.top - listRect.top : rect.bottom - listRect.top + 8;
    ghost.innerHTML = draggedEl.outerHTML;
    ghost.style.top = y + 'px';
    ghost.classList.add('visible');
  });

  list.addEventListener('dragend', () => {
    if (draggedEl) draggedEl.classList.remove('dragging');
    ghost.classList.remove('visible');
    ghost.innerHTML = '';
    draggedEl = null;
  });

  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) {
      ghost.classList.remove('visible');
    }
  });
})();
</script>
<script src="huge-nav.js"></script>
</body>
</html>
