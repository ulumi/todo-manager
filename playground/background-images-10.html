    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {

      background: #0a0a0a;
      color: #fff;
      padding: 40px 24px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 {
      font-size: 36px; font-weight: 900; margin-bottom: 8px;
      background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 50%, #34d399 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { color: rgba(255,255,255,.5); font-size: 14px; margin-bottom: 32px; }

    .toolbar {
      display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; align-items: center;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px; padding: 12px 16px;
    }
    .btn {
      padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,.15);
      background: rgba(167,139,250,.1); color: #d8b4fe; cursor: pointer;
      font-weight: 600; font-size: 12px; transition: all .2s;
    }
    .btn:hover { background: rgba(167,139,250,.2); border-color: rgba(167,139,250,.4); }
    .btn.secondary { background: rgba(255,255,255,.06); color: rgba(255,255,255,.6); border-color: rgba(255,255,255,.08); }
    .select-counter { margin-left: auto; color: rgba(255,255,255,.4); font-size: 12px; }
    .select-counter strong { color: #a78bfa; }

    .bg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .bg-item {
      position: relative; cursor: pointer; border-radius: 16px; overflow: hidden;
      border: 2px solid transparent; transition: all .3s cubic-bezier(.2,1,.3,1);
      aspect-ratio: 16/10; background: #111;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
    }
    .bg-item:hover {
      border-color: #a78bfa; transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(167,139,250,.2);
    }
    .bg-item.selected {
      border-color: #a78bfa;
      box-shadow: 0 0 0 2px rgba(167,139,250,.5), 0 20px 40px rgba(167,139,250,.3);
    }
    .bg-item svg { width: 100%; height: 100%; display: block; }
    .bg-checkbox {
      position: absolute; top: 12px; left: 12px; width: 20px; height: 20px;
      cursor: pointer; accent-color: #a78bfa; z-index: 20;
    }
    .bg-label {
      position: absolute; bottom: 10px; left: 10px; right: 10px;
      font-size: 11px; font-weight: 600;
      background: rgba(0,0,0,.75); backdrop-filter: blur(8px);
      padding: 6px 10px; border-radius: 8px; z-index: 5;
    }

    .info-box {
      background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2);
      border-radius: 12px; padding: 16px; margin-top: 32px; color: rgba(255,255,255,.6);
      font-size: 12px; line-height: 1.6;
    }
    .info-box code { background: rgba(0,0,0,.4); padding: 2px 6px; border-radius: 4px; font-family: monospace; }

    @media (max-width: 768px) {
      h1 { font-size: 24px; }
      .bg-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

// Render
const gridEl = document.getElementById('grid');
let selectedSet = new Set();

artworks.forEach(art => {
  const item = document.createElement('div');
  item.className = 'bg-item';
  item.dataset.id = art.id;
  item.innerHTML = `
    ${art.svg}
    <input type="checkbox" class="bg-checkbox" data-id="${art.id}">
    <div class="bg-label">${art.label}</div>
  `;
  gridEl.appendChild(item);

  const cb = item.querySelector('input');
  cb.addEventListener('change', () => {
    cb.checked ? selectedSet.add(art.id) : selectedSet.delete(art.id);
    item.classList.toggle('selected', cb.checked);
    document.getElementById('counter').textContent = selectedSet.size;
  });
  item.addEventListener('click', e => {
    if (e.target !== cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); }
  });
});

document.getElementById('selectAll').addEventListener('click', () => {
  document.querySelectorAll('.bg-checkbox').forEach(cb => {
    cb.checked = true; selectedSet.add(cb.dataset.id);
    cb.closest('.bg-item').classList.add('selected');
  });
  document.getElementById('counter').textContent = selectedSet.size;
});
document.getElementById('deselectAll').addEventListener('click', () => {
  document.querySelectorAll('.bg-checkbox').forEach(cb => {
    cb.checked = false; selectedSet.delete(cb.dataset.id);
    cb.closest('.bg-item').classList.remove('selected');
  });
  document.getElementById('counter').textContent = selectedSet.size;
});
document.getElementById('copyIds').addEventListener('click', () => {
  const ids = Array.from(selectedSet).sort().join(', ');
  navigator.clipboard.writeText(ids).then(() => {
    const btn = document.getElementById('copyIds');
    btn.textContent = '✅ Copied!';
    setTimeout(() => { btn.textContent = '📋 Copy IDs'; }, 2000);
  });
});
</script>
