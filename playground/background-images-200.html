<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◉ 200 Vector Art Backgrounds</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#050508;color:#e2e0ea;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh}
  .header{text-align:center;padding:2.5rem 1rem 1rem}
  .header h1{font-size:2rem;font-weight:300;letter-spacing:.12em;color:#c4b5fd}
  .header p{font-size:.95rem;color:#7c7a8a;margin-top:.4rem;font-style:italic}
  .toolbar{display:flex;justify-content:center;flex-wrap:wrap;gap:.5rem;padding:.8rem 1rem 1.2rem}
  .toolbar button{background:#1a1726;border:1px solid #2a2640;color:#a09cb0;padding:.35rem .85rem;border-radius:6px;cursor:pointer;font-size:.78rem;transition:all .2s}
  .toolbar button:hover,.toolbar button.active{background:#2d2850;color:#c4b5fd;border-color:#5b4fa0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:0 1rem 4rem}
  .card{position:relative;border-radius:14px;overflow:hidden;background:#0c0a14;border:1px solid #1a1730;height:180px;cursor:pointer;transition:all .3s}
  .card:hover{border-color:#7c3aed;transform:translateY(-6px);box-shadow:0 8px 30px rgba(124,58,237,.25)}
  .card svg{width:100%;height:100%;display:block}
  .card .label{position:absolute;bottom:0;left:0;right:0;padding:4px 8px;background:linear-gradient(transparent,rgba(5,5,8,.9));font-size:.62rem;color:#8a87a0;text-align:right;pointer-events:none}
  .card .cb{position:absolute;top:6px;left:6px;width:18px;height:18px;border-radius:4px;border:1.5px solid #3a3660;background:rgba(10,8,18,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .card .cb.checked{background:#7c3aed;border-color:#7c3aed}
  .card .cb.checked::after{content:'✓';color:#fff;font-size:11px}
  .copy-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1726ee;border-top:1px solid #2a2640;padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;transform:translateY(100%);transition:transform .3s;backdrop-filter:blur(8px)}
  .copy-bar.show{transform:translateY(0)}
  .copy-bar span{color:#a09cb0;font-size:.82rem}
  .copy-bar button{background:#7c3aed;color:#fff;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-size:.8rem}
  .hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <h1>◉ 200 Vector Art Backgrounds</h1>
  <p>Professional quality — inspired by modern design</p>
</div>
<div class="toolbar" id="toolbar"></div>
<div class="grid" id="grid"></div>
<div class="copy-bar" id="copyBar">
  <span id="selCount">0 selected</span>
  <button onclick="copySelected()">Copy IDs</button>
</div>

<script>
// ─── SEEDED PRNG ──────────────────────────────────────────
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t^=t+Math.imul(t^t>>>7,61|t);return((t^t>>>14)>>>0)/4294967296}}

function makeRng(seed){return mulberry32(seed*2654435761>>>0)}

// ─── COLOR PALETTES ───────────────────────────────────────
const PALETTES = [
  ['#00e5ff','#e040fb','#7c4dff','#18ffff','#aa00ff'],
  ['#536dfe','#7c4dff','#b388ff','#1a237e','#304ffe'],
  ['#ff6d00','#ff1744','#f50057','#ffd600','#ff3d00'],
  ['#00bfa5','#1de9b6','#64ffda','#004d40','#00e676'],
  ['#ec4899','#f59e0b','#fbbf24','#be185d','#f472b6'],
  ['#e0e7ff','#c7d2fe','#a5b4fc','#818cf8','#6366f1'],
];

const sin=Math.sin, cos=Math.cos, PI=Math.PI, TAU=PI*2, abs=Math.abs, floor=Math.floor, min=Math.min, max=Math.max;

// ─── SVG HELPERS ──────────────────────────────────────────
function svgOpen(extra=''){return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"${extra}>`}
function svgClose(){return '</svg>'}
function lerp(a,b,t){return a+(b-a)*t}
function hexToRgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}
function lerpColor(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(lerp(r1,r2,t)),g=Math.round(lerp(g1,g2,t)),b=Math.round(lerp(b1,b2,t));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function glowFilter(id,color,std=10){
  return `<filter id="${id}" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceGraphic" stdDeviation="${std}" result="blur"/><feFlood flood-color="${color}" flood-opacity="0.6" result="color"/><feComposite in="color" in2="blur" operator="in" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
}

function dropShadowFilter(id,dx=0,dy=4,std=6,color='rgba(0,0,0,0.3)'){
  return `<filter id="${id}" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="${dx}" dy="${dy}" stdDeviation="${std}" flood-color="${color}"/></filter>`;
}

// ─── STYLE 1: NEON DIAGONALS ─────────────────────────────
function genNeonDiagonals(idx,seed){
  const rng=makeRng(seed);
  const pal=PALETTES[floor(rng()*PALETTES.length)];
  const pick=()=>pal[floor(rng()*pal.length)];
  const numShapes=5+floor(rng()*6);
  const angle=-45+rng()*90;
  const bgC1=lerpColor('#0a0a1a',pick(),0.08);
  const bgC2=lerpColor('#0a0520',pick(),0.1);

  let defs=`<defs>`;
  defs+=`<linearGradient id="nd_bg${idx}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${bgC1}"/><stop offset="100%" stop-color="${bgC2}"/></linearGradient>`;

  let shapes='';
  for(let i=0;i<numShapes;i++){
    const c1=pick(),c2=pick(),c3=pick();
    const gid=`nd_g${idx}_${i}`;
    const fid=`nd_f${idx}_${i}`;
    const x1=rng(),y1=rng();
    defs+=`<linearGradient id="${gid}" x1="${x1}" y1="${y1}" x2="${1-x1}" y2="${1-y1}"><stop offset="0%" stop-color="${c1}" stop-opacity="${0.4+rng()*0.4}"/><stop offset="50%" stop-color="${c2}" stop-opacity="${0.3+rng()*0.3}"/><stop offset="100%" stop-color="${c3}" stop-opacity="${0.2+rng()*0.4}"/></linearGradient>`;
    defs+=glowFilter(fid,c1,4+rng()*8);
    const cx=rng()*800,cy=rng()*500;
    const w=80+rng()*200,h=30+rng()*60;
    const rx=h/2;
    const rot=angle+rng()*40-20;
    const op=0.3+rng()*0.5;
    shapes+=`<rect x="${cx-w/2}" y="${cy-h/2}" width="${w}" height="${h}" rx="${rx}" fill="url(#${gid})" opacity="${op}" transform="rotate(${rot},${cx},${cy})" filter="url(#${fid})"/>`;
  }
  defs+=`</defs>`;
  return svgOpen()+defs+`<rect width="800" height="500" fill="url(#nd_bg${idx})"/>`+shapes+svgClose();
}

// ─── STYLE 2: ORGANIC NEUMORPHISM ────────────────────────
function genOrganicNeumorph(idx,seed){
  const rng=makeRng(seed);
  const baseLightness=210+floor(rng()*20);
  const bgBase=`rgb(${baseLightness},${baseLightness+4},${baseLightness+10})`;
  const bgDarker=`rgb(${baseLightness-10},${baseLightness-6},${baseLightness})`;
  const numBlobs=3+floor(rng()*4);

  let defs=`<defs>`;
  defs+=`<linearGradient id="nm_bg${idx}" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0%" stop-color="${bgBase}"/><stop offset="100%" stop-color="${bgDarker}"/></linearGradient>`;

  let shapes='';
  for(let i=0;i<numBlobs;i++){
    const fid=`nm_f${idx}_${i}`;
    defs+=`<filter id="${fid}" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="${3+rng()*4}" dy="${3+rng()*4}" stdDeviation="${6+rng()*6}" flood-color="rgba(0,0,0,${0.08+rng()*0.08})"/><feDropShadow dx="${-2-rng()*3}" dy="${-2-rng()*3}" stdDeviation="${4+rng()*4}" flood-color="rgba(255,255,255,${0.6+rng()*0.3})"/></filter>`;
    const cx=100+rng()*600,cy=80+rng()*340;
    const baseR=60+rng()*80;
    const pts=8+floor(rng()*5);
    let path='M ';
    const angles=[];
    for(let j=0;j<pts;j++) angles.push(j*TAU/pts);
    const coords=angles.map((a,j)=>{
      const r=baseR+sin(a*2+seed)*baseR*0.3+rng()*baseR*0.2;
      return [cx+cos(a)*r, cy+sin(a)*r];
    });
    // Build smooth closed cubic bezier
    for(let j=0;j<coords.length;j++){
      const curr=coords[j], next=coords[(j+1)%coords.length], prev=coords[(j-1+coords.length)%coords.length];
      if(j===0) path+=`${curr[0]} ${curr[1]} `;
      const cp1x=curr[0]+(next[0]-prev[0])*0.25;
      const cp1y=curr[1]+(next[1]-prev[1])*0.25;
      const nnext=coords[(j+2)%coords.length];
      const cp2x=next[0]-(nnext[0]-curr[0])*0.25;
      const cp2y=next[1]-(nnext[1]-curr[1])*0.25;
      path+=`C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${next[0]} ${next[1]} `;
    }
    path+='Z';
    const l=baseLightness+5+floor(rng()*15);
    const fillColor=`rgb(${l},${l+3},${l+8})`;
    shapes+=`<path d="${path}" fill="${fillColor}" filter="url(#${fid})"/>`;
  }
  defs+=`</defs>`;
  return svgOpen()+defs+`<rect width="800" height="500" fill="url(#nm_bg${idx})"/>`+shapes+svgClose();
}

// ─── STYLE 3: GLOWING WAVES ──────────────────────────────
function genGlowingWaves(idx,seed){
  const rng=makeRng(seed);
  const pal=PALETTES[floor(rng()*PALETTES.length)];
  const pick=()=>pal[floor(rng()*pal.length)];
  const bgC1=lerpColor('#0a0a1a',pick(),0.06);
  const bgC2=lerpColor('#1a0a2a',pick(),0.08);
  const numWaves=2+floor(rng()*2);

  let defs=`<defs>`;
  defs+=`<linearGradient id="gw_bg${idx}" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="${bgC1}"/><stop offset="50%" stop-color="${bgC2}"/><stop offset="100%" stop-color="${bgC1}"/></linearGradient>`;

  let shapes='';
  for(let i=0;i<numWaves;i++){
    const c1=pick(),c2=pick(),c3=pick();
    const gid=`gw_g${idx}_${i}`;
    const fid=`gw_f${idx}_${i}`;
    defs+=`<linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${c1}"/><stop offset="50%" stop-color="${c2}"/><stop offset="100%" stop-color="${c3}"/></linearGradient>`;
    defs+=`<filter id="${fid}" x="-10%" y="-40%" width="120%" height="180%"><feGaussianBlur in="SourceGraphic" stdDeviation="${8+rng()*12}"/></filter>`;

    const freq=0.006+rng()*0.012;
    const amp=30+rng()*60;
    const phase=rng()*TAU;
    const yBase=100+i*120+rng()*60;
    const freq2=freq*1.5+rng()*0.005;
    const amp2=amp*0.3+rng()*20;

    let d='M 0 '+yBase;
    for(let x=0;x<=800;x+=4){
      const y=yBase+sin(x*freq+phase)*amp+sin(x*freq2+phase*1.7)*amp2;
      d+=` L ${x} ${y}`;
    }
    const strokeW=2+rng()*3;
    // Glow layer
    shapes+=`<path d="${d}" fill="none" stroke="url(#${gid})" stroke-width="${strokeW*3}" opacity="0.4" filter="url(#${fid})"/>`;
    // Main stroke
    shapes+=`<path d="${d}" fill="none" stroke="url(#${gid})" stroke-width="${strokeW}" opacity="0.9" stroke-linecap="round"/>`;
  }
  defs+=`</defs>`;
  return svgOpen()+defs+`<rect width="800" height="500" fill="url(#gw_bg${idx})"/>`+shapes+svgClose();
}

// ─── STYLE 4: DARK LAYERED WAVES ─────────────────────────
function genDarkLayeredWaves(idx,seed){
  const rng=makeRng(seed);
  const accentPal=PALETTES[floor(rng()*PALETTES.length)];
  const pick=()=>accentPal[floor(rng()*accentPal.length)];
  const numLayers=4+floor(rng()*3);
  const bgDark=lerpColor('#0e0e16','#1a1a25',rng());

  let defs=`<defs>`;
  defs+=`<linearGradient id="dl_bg${idx}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${bgDark}"/><stop offset="100%" stop-color="${lerpColor(bgDark,'#000000',0.3)}"/></linearGradient>`;

  let shapes='';
  for(let i=0;i<numLayers;i++){
    const shade=lerp(0.16,0.10,i/numLayers);
    const fillColor=`rgb(${floor(shade*255)},${floor(shade*255)},${floor(shade*280)})`;
    const freq=0.004+rng()*0.008;
    const amp=20+rng()*40;
    const phase=rng()*TAU;
    const yBase=120+i*65+rng()*30;
    const freq2=freq*2.3;
    const amp2=amp*0.25;

    let d=`M 0 500 L 0 ${yBase}`;
    for(let x=0;x<=800;x+=4){
      const y=yBase+sin(x*freq+phase)*amp+sin(x*freq2+phase*0.7)*amp2;
      d+=` L ${x} ${y}`;
    }
    d+=` L 800 500 Z`;
    shapes+=`<path d="${d}" fill="${fillColor}" opacity="0.85"/>`;

    // Accent glow line on edge
    const accentColor=pick();
    const lfid=`dl_lf${idx}_${i}`;
    defs+=`<filter id="${lfid}" x="-5%" y="-50%" width="110%" height="200%"><feGaussianBlur in="SourceGraphic" stdDeviation="${4+rng()*6}"/></filter>`;
    let edgePath=`M 0 ${yBase}`;
    for(let x=0;x<=800;x+=4){
      const y=yBase+sin(x*freq+phase)*amp+sin(x*freq2+phase*0.7)*amp2;
      edgePath+=` L ${x} ${y}`;
    }
    // Glow
    shapes+=`<path d="${edgePath}" fill="none" stroke="${accentColor}" stroke-width="3" opacity="0.3" filter="url(#${lfid})"/>`;
    // Thin bright line
    shapes+=`<path d="${edgePath}" fill="none" stroke="${accentColor}" stroke-width="1" opacity="0.7"/>`;
  }
  defs+=`</defs>`;
  return svgOpen()+defs+`<rect width="800" height="500" fill="url(#dl_bg${idx})"/>`+shapes+svgClose();
}

// ─── STYLE 5: TOPOGRAPHIC DEPTHS ─────────────────────────
function genTopographicDepths(idx,seed){
  const rng=makeRng(seed);
  const pal=PALETTES[floor(rng()*PALETTES.length)];
  const numRings=6+floor(rng()*5);
  const cx=200+rng()*400, cy=150+rng()*200;
  const baseR=140+rng()*60;
  const baseDark=lerpColor('#1a1a20','#2a2a35',rng());
  const accentColor=pal[floor(rng()*pal.length)];

  let defs=`<defs>`;
  defs+=`<linearGradient id="tp_bg${idx}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${lerpColor(baseDark,'#0a0a10',0.3)}"/><stop offset="100%" stop-color="${baseDark}"/></linearGradient>`;
  defs+=`<filter id="tp_sh${idx}" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/></filter>`;
  defs+=`</defs>`;

  let shapes=`<rect width="800" height="500" fill="url(#tp_bg${idx})"/>`;
  // Secondary cluster
  const cx2=cx+(rng()-0.5)*300, cy2=cy+(rng()-0.5)*150;
  const baseR2=baseR*0.6;

  for(let cluster=0;cluster<2;cluster++){
    const ccx=cluster===0?cx:cx2, ccy=cluster===0?cy:cy2;
    const br=cluster===0?baseR:baseR2;
    const rings=cluster===0?numRings:floor(numRings*0.6);

    for(let i=0;i<rings;i++){
      const t=i/rings;
      const r=br*(1-t*0.8);
      const pts=10+floor(rng()*4);
      let path='M ';
      const coords=[];
      for(let j=0;j<pts;j++){
        const a=j*TAU/pts;
        const noiseR=r+sin(a*3+seed+i)*r*0.15+sin(a*5+seed*2)*r*0.08+rng()*r*0.05;
        coords.push([ccx+cos(a)*noiseR, ccy+sin(a)*noiseR]);
      }
      for(let j=0;j<coords.length;j++){
        const curr=coords[j], next=coords[(j+1)%coords.length], prev=coords[(j-1+coords.length)%coords.length];
        if(j===0) path+=`${curr[0]} ${curr[1]} `;
        const cp1x=curr[0]+(next[0]-prev[0])*0.28;
        const cp1y=curr[1]+(next[1]-prev[1])*0.28;
        const nnext=coords[(j+2)%coords.length];
        const cp2x=next[0]-(nnext[0]-curr[0])*0.28;
        const cp2y=next[1]-(nnext[1]-curr[1])*0.28;
        path+=`C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${next[0]} ${next[1]} `;
      }
      path+='Z';
      const shade=lerp(0.12,0.22,t);
      const fillColor=`rgb(${floor(shade*255)},${floor(shade*255)},${floor(shade*270)})`;
      shapes+=`<path d="${path}" fill="${fillColor}" filter="url(#tp_sh${idx})" opacity="0.9"/>`;
      // Subtle edge highlight
      if(rng()>0.5){
        shapes+=`<path d="${path}" fill="none" stroke="${hexToRgba(accentColor,0.08+rng()*0.06)}" stroke-width="0.5"/>`;
      }
    }
  }
  return svgOpen()+defs+shapes+svgClose();
}

// ─── STYLE 6: COLORFUL LINE WAVES ────────────────────────
function genColorfulLineWaves(idx,seed){
  const rng=makeRng(seed);
  const pal=PALETTES[floor(rng()*PALETTES.length)];
  const numLines=15+floor(rng()*16);
  const bgC=lerpColor('#0a0a2a','#150a30',rng());

  let defs=`<defs>`;
  defs+=`<linearGradient id="cl_bg${idx}" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="${bgC}"/><stop offset="100%" stop-color="${lerpColor(bgC,'#050510',0.4)}"/></linearGradient>`;
  // Multi-color gradient for strokes
  for(let i=0;i<numLines;i++){
    const gid=`cl_g${idx}_${i}`;
    const c1=pal[floor(rng()*pal.length)], c2=pal[floor(rng()*pal.length)], c3=pal[floor(rng()*pal.length)];
    defs+=`<linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${c1}"/><stop offset="50%" stop-color="${c2}"/><stop offset="100%" stop-color="${c3}"/></linearGradient>`;
  }
  defs+=`</defs>`;

  let shapes=`<rect width="800" height="500" fill="url(#cl_bg${idx})"/>`;

  const baseFreq=0.006+rng()*0.008;
  const baseAmp=30+rng()*50;
  const baseY=200+rng()*100;
  const basePhase=rng()*TAU;

  for(let i=0;i<numLines;i++){
    const freq=baseFreq+rng()*0.004-0.002;
    const amp=baseAmp+rng()*30-15;
    const phase=basePhase+i*0.15+rng()*0.3;
    const yOff=baseY+(i-numLines/2)*6+rng()*4;
    const freq2=freq*2.1+rng()*0.003;
    const amp2=amp*0.2;

    let d=`M -10 ${yOff+sin(-10*freq+phase)*amp}`;
    for(let x=0;x<=810;x+=5){
      const y=yOff+sin(x*freq+phase)*amp+sin(x*freq2+phase*1.3)*amp2;
      d+=` L ${x} ${y}`;
    }
    const gid=`cl_g${idx}_${i}`;
    shapes+=`<path d="${d}" fill="none" stroke="url(#${gid})" stroke-width="${1+rng()*1.2}" opacity="${0.5+rng()*0.4}" stroke-linecap="round"/>`;
  }

  // Scatter some dot particles
  const numDots=20+floor(rng()*30);
  for(let i=0;i<numDots;i++){
    const dx=rng()*800, dy=rng()*500;
    const dr=0.5+rng()*2;
    const dc=pal[floor(rng()*pal.length)];
    shapes+=`<circle cx="${dx}" cy="${dy}" r="${dr}" fill="${dc}" opacity="${0.15+rng()*0.35}"/>`;
  }

  return svgOpen()+defs+shapes+svgClose();
}

// ─── GENERATE ALL 200 ────────────────────────────────────
const STYLES=[
  {name:'Neon Diagonals',   fn:genNeonDiagonals,    count:33, prefix:'neon'},
  {name:'Organic Neumorphism',fn:genOrganicNeumorph, count:33, prefix:'neumorph'},
  {name:'Glowing Waves',    fn:genGlowingWaves,     count:33, prefix:'glowwave'},
  {name:'Dark Layered Waves',fn:genDarkLayeredWaves, count:33, prefix:'darklayer'},
  {name:'Topographic Depths',fn:genTopographicDepths,count:34, prefix:'topo'},
  {name:'Colorful Line Waves',fn:genColorfulLineWaves,count:34,prefix:'linewaves'},
];

// Build card metadata (WITHOUT generating SVGs yet)
const allCards=[];
let globalIdx=0;
STYLES.forEach(style=>{
  for(let i=0;i<style.count;i++){
    const seed=globalIdx*7919+13;
    allCards.push({id:`${style.prefix}-${i+1}`,seed,genFn:style.fn,genIdx:globalIdx,style:style.name});
    globalIdx++;
  }
});

// ─── UI ──────────────────────────────────────────────────
const selected=new Set();
let activeFilter=null;

// Toolbar
const toolbar=document.getElementById('toolbar');
const allBtn=document.createElement('button');
allBtn.textContent='All (200)';
allBtn.className='active';
allBtn.onclick=()=>{activeFilter=null;renderGrid();setActive(allBtn)};
toolbar.appendChild(allBtn);

STYLES.forEach(s=>{
  const btn=document.createElement('button');
  btn.textContent=s.name;
  btn.onclick=()=>{activeFilter=s.name;renderGrid();setActive(btn)};
  toolbar.appendChild(btn);
});

function setActive(btn){
  toolbar.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// Lazy rendering — only generate SVGs when visible
const observer=new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const div=entry.target;
      if(!div.dataset.rendered){
        const idx=parseInt(div.dataset.genIdx);
        const card=allCards.find(c=>c.genIdx===idx);
        if(card){
          const svg=card.genFn(card.genIdx,card.seed);
          div.insertAdjacentHTML('afterbegin',svg);
          div.dataset.rendered='1';
        }
      }
      observer.unobserve(div);
    }
  });
},{rootMargin:'200px'});

// Grid
const grid=document.getElementById('grid');
function renderGrid(){
  grid.innerHTML='';
  const items=activeFilter?allCards.filter(c=>c.style===activeFilter):allCards;
  items.forEach(card=>{
    const div=document.createElement('div');
    div.className='card';
    div.dataset.genIdx=card.genIdx;
    div.innerHTML=`<div class="label">${card.id}</div><div class="cb${selected.has(card.id)?' checked':''}" data-id="${card.id}"></div>`;
    div.querySelector('.cb').onclick=e=>{
      e.stopPropagation();
      const cb=e.currentTarget;
      if(selected.has(card.id)){selected.delete(card.id);cb.classList.remove('checked')}
      else{selected.add(card.id);cb.classList.add('checked')}
      updateBar();
    };
    grid.appendChild(div);
    observer.observe(div);
  });
}

function updateBar(){
  const bar=document.getElementById('copyBar');
  document.getElementById('selCount').textContent=selected.size+' selected';
  bar.classList.toggle('show',selected.size>0);
}

function copySelected(){
  navigator.clipboard.writeText([...selected].join(', ')).then(()=>{
    const btn=document.querySelector('.copy-bar button');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy IDs',1500);
  });
}

renderGrid();
</script>
