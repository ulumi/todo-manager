<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — Todo Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #222636;
      --primary:    #f59e0b;
      --success:    #4ade80;
      --danger:     #f87171;
      --text:       #f1f5f9;
      --muted:      #8b96a8;
      --border:     #2d3147;
      --radius:     10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Login screen ───────────────────────────────── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .login-card h1 { font-size: 18px; font-weight: 600; }
    .login-card p  { color: var(--muted); font-size: 13px; }
    .login-card input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .login-card input:focus { border-color: var(--primary); }
    .login-card input::placeholder { color: var(--muted); }
    #loginError { color: var(--danger); font-size: 13px; display: none; }

    /* ── Shared button ──────────────────────────────── */
    .btn {
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: #0f1117;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 18px;
      transition: opacity .15s;
    }
    .btn:hover    { opacity: .85; }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: var(--danger); }

    /* ── Dashboard shell ────────────────────────────── */
    #dashboard { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
    }
    header h1 { font-size: 16px; font-weight: 600; flex: 1; }
    #adminEmail { color: var(--muted); font-size: 13px; }

    nav {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
    }
    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      transition: color .15s, border-color .15s;
    }
    .tab.active { color: var(--primary); border-color: var(--primary); }

    main { padding: 24px; max-width: 960px; }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Cards / tables ─────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .card-header h2 { font-size: 14px; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .05em;
      padding: 10px 16px;
      text-align: left;
      text-transform: uppercase;
    }
    tbody tr { border-top: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 10px 16px; vertical-align: middle; }

    .badge {
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
    }
    .badge-green  { background: rgba(74,222,128,.15); color: var(--success); }
    .badge-yellow { background: rgba(245,158,11,.15); color: var(--primary); }
    .badge-muted  { background: var(--surface2); color: var(--muted); }

    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .dot-green  { background: var(--success); }
    .dot-muted  { background: var(--muted); }

    .empty { color: var(--muted); padding: 32px; text-align: center; }

    /* ── Chat panel ─────────────────────────────────── */
    .admin-chat {
      display: grid;
      grid-template-columns: 220px 1fr;
      height: calc(100vh - 140px);
      max-height: 640px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
    }
    .admin-chat__sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .admin-chat__sidebar-header {
      padding: 12px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .admin-chat__user-list {
      flex: 1;
      overflow-y: auto;
    }
    .admin-chat__user-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .admin-chat__user-item:hover  { background: var(--surface2); }
    .admin-chat__user-item.active { background: rgba(245,158,11,.1); border-left: 2px solid var(--primary); }
    .admin-chat__user-email { font-size: 13px; font-weight: 500; word-break: break-all; }
    .admin-chat__user-type  { font-size: 11px; color: var(--muted); }
    .admin-chat__empty-list { padding: 24px; text-align: center; color: var(--muted); font-size: 13px; }

    .admin-chat__main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .admin-chat__convo-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      min-height: 49px;
    }
    .admin-chat__convo-name  { font-weight: 600; font-size: 14px; flex: 1; }
    .admin-chat__convo-empty { color: var(--muted); font-size: 13px; }

    .admin-chat__messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .admin-chat__placeholder {
      margin: auto;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    /* Chat bubbles */
    .chat-msg {
      display: flex;
      gap: 8px;
    }
    /* Admin message = right (amber) */
    .chat-msg--admin {
      justify-content: flex-end;
    }
    .chat-msg--admin .chat-msg__bubble {
      background: var(--primary);
      color: #0f1117;
      border-radius: 12px 4px 12px 12px;
    }
    .chat-msg--admin .chat-msg__time { color: rgba(0,0,0,.5); text-align: right; }

    /* User message = left (surface) */
    .chat-msg--user {
      justify-content: flex-start;
    }
    .chat-msg--user .chat-msg__bubble {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px 12px 12px 12px;
    }
    .chat-msg--user .chat-msg__time { color: var(--muted); }

    .chat-msg__bubble {
      padding: 8px 14px;
      max-width: 70%;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .chat-msg__time {
      font-size: 10px;
      margin-top: 4px;
    }

    /* Input bar */
    .admin-chat__input-bar {
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .admin-chat__input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 9px 12px;
      outline: none;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      transition: border-color .15s;
    }
    .admin-chat__input:focus { border-color: var(--primary); }
    .admin-chat__input::placeholder { color: var(--muted); }
    .admin-chat__input:disabled { opacity: .5; }
    .admin-chat__send {
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: #0f1117;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 16px;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .admin-chat__send:hover    { opacity: .85; }
    .admin-chat__send:disabled { opacity: .5; cursor: default; }

    #sendStatus { font-size: 13px; display: none; padding: 0 14px 10px; }
    #sendStatus.ok  { color: var(--success); display: block; }
    #sendStatus.err { color: var(--danger);  display: block; }

    /* ── Refresh btn spinner ────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin .6s linear infinite; display: inline-block; }

    .toolbar { display: flex; align-items: center; gap: 8px; }
    .count-badge {
      background: var(--surface2);
      border-radius: 99px;
      color: var(--muted);
      font-size: 11px;
      padding: 2px 8px;
    }
  </style>
</head>
<body>

<!-- ══════════ LOGIN SCREEN ══════════ -->
<div id="loginScreen">
  <div class="login-card">
    <h1>🔒 Super Admin</h1>
    <p>Sign in with your admin account.</p>
    <input type="email"    id="loginEmail"    placeholder="Email"    autocomplete="email" />
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" />
    <p id="loginError"></p>
    <button class="btn" id="loginBtn">Sign in</button>
  </div>
</div>

<!-- ══════════ DASHBOARD ══════════ -->
<div id="dashboard">
  <header>
    <h1>Super Admin</h1>
    <span id="adminEmail"></span>
    <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
  </header>

  <nav>
    <button class="tab active" data-panel="usersPanel">Users</button>
    <button class="tab"        data-panel="onlinePanel">Online now</button>
    <button class="tab"        data-panel="messagePanel">Send message</button>
  </nav>

  <main>
    <!-- Users panel -->
    <div id="usersPanel" class="panel active">
      <div class="card">
        <div class="card-header">
          <h2>All accounts <span id="usersCount" class="count-badge">—</span></h2>
          <div class="toolbar">
            <button class="btn btn-ghost btn-sm" id="refreshUsers">↻ Refresh</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Email / UID</th>
              <th>Type</th>
              <th>Registered</th>
              <th>Last sign-in</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="5" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Online panel -->
    <div id="onlinePanel" class="panel">
      <div class="card">
        <div class="card-header">
          <h2>Online now <span id="onlineCount" class="count-badge">—</span></h2>
          <div class="toolbar">
            <button class="btn btn-ghost btn-sm" id="refreshOnline">↻ Refresh</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>UID</th>
              <th>Last seen</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody id="onlineBody">
            <tr><td colspan="4" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Message panel -->
    <div id="messagePanel" class="panel">
      <div class="admin-chat">
        <!-- Sidebar: user list -->
        <div class="admin-chat__sidebar">
          <div class="admin-chat__sidebar-header">Conversations</div>
          <div class="admin-chat__user-list" id="chatUserList">
            <div class="admin-chat__empty-list">Load users first</div>
          </div>
        </div>

        <!-- Main: conversation -->
        <div class="admin-chat__main">
          <div class="admin-chat__convo-header" id="chatConvoHeader">
            <span class="admin-chat__convo-empty">← Select a user</span>
          </div>
          <div class="admin-chat__messages" id="chatConvoMessages">
            <div class="admin-chat__placeholder">
              Select a user from the list<br>to start a conversation.
            </div>
          </div>
          <span id="sendStatus"></span>
          <div class="admin-chat__input-bar">
            <textarea class="admin-chat__input" id="msgText" placeholder="Write a message…" rows="1" disabled></textarea>
            <button class="admin-chat__send" id="sendBtn" disabled>Send</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ══════════ FIREBASE + SCRIPT ══════════ -->
<script type="module">
  import { initializeApp }               from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:            'AIzaSyCp3bbr6hMjP7oo7bfUmRNfIA4O6IKbtkQ',
    authDomain:        'huge-todo.firebaseapp.com',
    projectId:         'huge-todo',
    storageBucket:     'huge-todo.firebasestorage.app',
    messagingSenderId: '708112988153',
    appId:             '1:708112988153:web:af75de9f76959816dc2f28',
  };

  const API = 'http://localhost:3333';

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── Presence (admin page) ────────────────────────────
  let _presenceInterval = null;

  function startPresence(user) {
    stopPresence();
    const ref = doc(db, 'presence', user.uid);
    const setOnline = () => setDoc(ref, {
      online: true, lastSeen: serverTimestamp(),
      email: user.email || null, displayName: 'Admin', isAnonymous: false,
    }, { merge: true }).catch(() => {});
    const setOffline = () => setDoc(ref, { online: false, lastSeen: serverTimestamp() }, { merge: true }).catch(() => {});
    setOnline();
    _presenceInterval = setInterval(setOnline, 30_000);
    window.addEventListener('beforeunload', setOffline);
    document.addEventListener('visibilitychange', () => document.hidden ? setOffline() : setOnline());
  }

  function stopPresence() {
    if (_presenceInterval) { clearInterval(_presenceInterval); _presenceInterval = null; }
  }

  // ── UI refs ──────────────────────────────────────────
  const loginScreen  = document.getElementById('loginScreen');
  const dashboard    = document.getElementById('dashboard');
  const loginEmail   = document.getElementById('loginEmail');
  const loginPassword= document.getElementById('loginPassword');
  const loginBtn     = document.getElementById('loginBtn');
  const loginError   = document.getElementById('loginError');
  const adminEmail   = document.getElementById('adminEmail');
  const logoutBtn    = document.getElementById('logoutBtn');

  const usersBody    = document.getElementById('usersBody');
  const usersCount   = document.getElementById('usersCount');
  const onlineBody   = document.getElementById('onlineBody');
  const onlineCount  = document.getElementById('onlineCount');
  // msgText / sendBtn / sendStatus are referenced in the chat section below

  let _token = null;

  // ── Helpers ──────────────────────────────────────────
  async function api(path) {
    const res = await fetch(API + path, {
      headers: { Authorization: `Bearer ${_token}` },
    });
    if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
    return res.json();
  }

  async function apiPost(path, body) {
    const res = await fetch(API + path, {
      method: 'POST',
      headers: { Authorization: `Bearer ${_token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
    return res.json();
  }

  function fmtDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
  function fmtMs(ms) {
    if (!ms) return '—';
    return fmtDate(new Date(ms).toISOString());
  }

  function setRefreshSpin(btn, on) {
    const icon = btn.textContent.replace('↻', '').trim();
    btn.innerHTML = on ? `<span class="spinning">↻</span> ${icon}` : `↻ ${icon}`;
    btn.disabled = on;
  }

  // ── Login ────────────────────────────────────────────
  loginBtn.addEventListener('click', async () => {
    loginError.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';
    try {
      await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPassword.value);
    } catch (e) {
      loginError.textContent = e.message;
      loginError.style.display = 'block';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign in';
    }
  });
  loginPassword.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

  logoutBtn.addEventListener('click', () => signOut(auth));

  // ── Auth state ───────────────────────────────────────
  onAuthStateChanged(auth, async user => {
    if (user) {
      _token = await user.getIdToken();
      // Verify admin access
      try {
        await api('/admin/users');
      } catch (e) {
        loginError.textContent = 'Access denied — not an admin account.';
        loginError.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in';
        await signOut(auth);
        return;
      }
      adminEmail.textContent = user.email;
      loginScreen.style.display = 'none';
      dashboard.style.display = 'block';
      startPresence(user);
      loadUsers();
    } else {
      _token = null;
      stopPresence();
      loginScreen.style.display = 'flex';
      dashboard.style.display = 'none';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign in';
    }
  });

  // ── Tabs ─────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.panel).classList.add('active');
      if (tab.dataset.panel === 'onlinePanel')  loadOnline();
      if (tab.dataset.panel === 'messagePanel') populateTargetList();
    });
  });

  // ── Users ────────────────────────────────────────────
  let _users = [];

  async function loadUsers() {
    const btn = document.getElementById('refreshUsers');
    setRefreshSpin(btn, true);
    try {
      _users = await api('/admin/users');
      renderUsers(_users);
    } catch (e) {
      usersBody.innerHTML = `<tr><td colspan="5" class="empty" style="color:var(--danger)">${e.message}</td></tr>`;
    } finally {
      setRefreshSpin(btn, false);
    }
  }

  function renderUsers(users) {
    usersCount.textContent = users.length;
    if (!users.length) {
      usersBody.innerHTML = '<tr><td colspan="5" class="empty">No users found.</td></tr>';
      return;
    }
    users.sort((a, b) => new Date(b.lastSignIn || 0) - new Date(a.lastSignIn || 0));
    usersBody.innerHTML = users.map(u => `
      <tr>
        <td>
          <div style="font-weight:500">${u.email || '<span style="color:var(--muted)">—</span>'}</div>
          <div style="color:var(--muted);font-size:11px;font-family:monospace">${u.uid}</div>
        </td>
        <td>${u.isAnonymous
          ? '<span class="badge badge-muted">Guest</span>'
          : '<span class="badge badge-green">Account</span>'}</td>
        <td style="color:var(--muted)">${fmtDate(u.creationTime)}</td>
        <td style="color:var(--muted)">${fmtDate(u.lastSignIn)}</td>
        <td>${u.disabled
          ? '<span class="badge badge-muted">Disabled</span>'
          : '<span class="badge badge-green">Active</span>'}</td>
      </tr>
    `).join('');
  }

  document.getElementById('refreshUsers').addEventListener('click', loadUsers);

  // ── Online ───────────────────────────────────────────
  async function loadOnline() {
    const btn = document.getElementById('refreshOnline');
    setRefreshSpin(btn, true);
    try {
      const online = await api('/admin/presence');
      onlineCount.textContent = online.length;
      if (!online.length) {
        onlineBody.innerHTML = '<tr><td colspan="4" class="empty">No one online right now.</td></tr>';
        return;
      }
      online.sort((a, b) => (b.lastSeen || 0) - (a.lastSeen || 0));
      onlineBody.innerHTML = online.map(u => `
        <tr>
          <td>
            <span class="dot dot-green"></span>
            ${u.email || '<span style="color:var(--muted)">Guest</span>'}
          </td>
          <td style="color:var(--muted);font-size:11px;font-family:monospace">${u.uid}</td>
          <td style="color:var(--muted)">${fmtMs(u.lastSeen)}</td>
          <td>${u.isAnonymous
            ? '<span class="badge badge-muted">Guest</span>'
            : '<span class="badge badge-green">Account</span>'}</td>
        </tr>
      `).join('');
    } catch (e) {
      onlineBody.innerHTML = `<tr><td colspan="4" class="empty" style="color:var(--danger)">${e.message}</td></tr>`;
    } finally {
      setRefreshSpin(btn, false);
    }
  }

  document.getElementById('refreshOnline').addEventListener('click', loadOnline);

  // ── Chat interface (Send message) ────────────────────
  let _selectedUid    = null;
  let _pollInterval   = null;

  const chatUserList      = document.getElementById('chatUserList');
  const chatConvoHeader   = document.getElementById('chatConvoHeader');
  const chatConvoMessages = document.getElementById('chatConvoMessages');
  const msgText           = document.getElementById('msgText');
  const sendBtn           = document.getElementById('sendBtn');
  const sendStatus        = document.getElementById('sendStatus');

  function populateTargetList() {
    chatUserList.innerHTML = '';
    const all = [
      ..._users.filter(u => !u.isAnonymous && u.email).sort((a, b) => (a.email || '').localeCompare(b.email || '')),
      ..._users.filter(u => u.isAnonymous),
    ];
    if (!all.length) {
      chatUserList.innerHTML = '<div class="admin-chat__empty-list">No users yet.</div>';
      return;
    }
    all.forEach(u => {
      const label = u.email || u.uid.slice(0, 18) + '…';
      const type  = u.isAnonymous ? 'Guest' : 'Account';
      const item  = document.createElement('div');
      item.className = 'admin-chat__user-item' + (u.uid === _selectedUid ? ' active' : '');
      item.innerHTML = `<span class="admin-chat__user-email">${label}</span><span class="admin-chat__user-type">${type}</span>`;
      item.addEventListener('click', () => selectUser(u.uid, label, item));
      chatUserList.appendChild(item);
    });
  }

  async function selectUser(uid, label, itemEl) {
    _selectedUid = uid;
    chatUserList.querySelectorAll('.admin-chat__user-item').forEach(el => el.classList.remove('active'));
    itemEl?.classList.add('active');
    chatConvoHeader.innerHTML = `<span class="admin-chat__convo-name">${label}</span>`;
    msgText.disabled = false;
    sendBtn.disabled = false;
    msgText.focus();
    // Stop previous poll
    if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null; }
    // Load thread immediately, then poll every 4s
    await loadThread();
    _pollInterval = setInterval(loadThread, 4000);
  }

  async function loadThread() {
    if (!_selectedUid) return;
    try {
      const msgs = await api(`/admin/messages/${encodeURIComponent(_selectedUid)}`);
      renderConvo(msgs);
    } catch (e) {
      // Fail silently on poll errors
    }
  }

  function renderConvo(msgs) {
    if (!msgs?.length) {
      chatConvoMessages.innerHTML = '<div class="admin-chat__placeholder">No messages yet.<br>Send the first one ↓</div>';
      return;
    }
    const wasAtBottom = chatConvoMessages.scrollHeight - chatConvoMessages.scrollTop <= chatConvoMessages.clientHeight + 40;
    chatConvoMessages.innerHTML = msgs.map(m => {
      const isAdmin = m.from !== 'user';
      const time = m.sentAt ? new Date(m.sentAt).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) : '';
      return `<div class="chat-msg chat-msg--${isAdmin ? 'admin' : 'user'}">
        <div class="chat-msg__bubble">
          ${m.message}
          ${time ? `<div class="chat-msg__time">${time}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    if (wasAtBottom) chatConvoMessages.scrollTop = chatConvoMessages.scrollHeight;
  }

  async function doSend() {
    const message = msgText.value.trim();
    if (!_selectedUid || !message) return;
    sendBtn.disabled = true;
    try {
      await apiPost('/admin/message', { targetUid: _selectedUid, message });
      msgText.value = '';
      msgText.style.height = '';
      await loadThread(); // refresh immediately after send
      showStatus('✓ Envoyé', true);
    } catch (e) {
      showStatus(e.message, false);
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', doSend);
  msgText.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
  });
  msgText.addEventListener('input', () => {
    msgText.style.height = '';
    msgText.style.height = Math.min(msgText.scrollHeight, 120) + 'px';
  });

  function showStatus(msg, ok) {
    sendStatus.textContent = msg;
    sendStatus.className   = ok ? 'ok' : 'err';
    if (msg) setTimeout(() => { sendStatus.textContent = ''; sendStatus.className = ''; }, 3000);
  }
</script>
</body>
</html>
