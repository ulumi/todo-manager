<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stats Mode — 5 concepts · Mars 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0f1117;
  --surface:  #1a1d2e;
  --s2:       #252840;
  --primary:  #5b5ef7;
  --border:   #2d3147;
  --text:     #f1f5f9;
  --muted:    #8b96a8;
  --danger:   #f87171;
  --green:    #4ade80;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 40px;
  max-width: 660px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 60px;
}

.page-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.concept { display: flex; flex-direction: column; gap: 14px; }

.concept-label {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.concept-num {
  font-size: 11px;
  font-weight: 800;
  color: var(--primary);
  background: color-mix(in srgb, var(--primary) 15%, transparent);
  border-radius: 4px;
  padding: 2px 6px;
  letter-spacing: .04em;
}
.concept-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

/* ── Shared calendar ─────────────────── */
.cal-wrap { display: flex; flex-direction: column; gap: 3px; }

.cal-headers {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.cal-hd {
  text-align: center;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  padding-bottom: 4px;
}

.cal {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  min-height: 62px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.cell.empty   { background: transparent; border-color: transparent; }
.cell.future  { opacity: .28; }
.cell.today   { border-color: var(--primary); border-width: 1.5px; }

.dn {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  padding: 5px 6px 2px;
  position: relative;
  z-index: 1;
  line-height: 1;
}
.cell.today .dn { color: var(--primary); }

/* ── Concept 1 — Barres graduées ─────── */
.bar-fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  border-radius: 0 0 6px 6px;
  transition: height .3s;
}
.bar-pct {
  position: absolute;
  bottom: 5px;
  right: 5px;
  font-size: 8px;
  font-weight: 700;
  opacity: .65;
  z-index: 1;
}

/* ── Concept 2 — Anneaux ──────────────── */
.ring-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding-bottom: 4px;
}
.ring-wrap svg { overflow: visible; }

/* ── Concept 3 — Météo ────────────────── */
.weather-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  font-size: 22px;
  padding-bottom: 4px;
}

/* ── Concept 4 — Montagne ─────────────── */
.mountain-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 20px 12px;
  position: relative;
}
.mountain-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 10px;
}
.mountain-chart { width: 100%; }

/* ── Concept 5 — Fond teinté + sceau ─── */
.stamp {
  position: absolute;
  top: 4px; right: 5px;
  font-size: 12px;
  z-index: 2;
  filter: drop-shadow(0 0 3px currentColor);
}
</style>
</head>
<body>

<div class="page-title">Stats mode · Mars 2026 — 5 représentations visuelles</div>

<div id="root"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────
// Completion % days 1–20 (today = day 20), days 21–31 = future
const scores = {
  1:72, 2:85, 3:100, 4:60, 5:92, 6:40, 7:25,
  8:78, 9:88, 10:100, 11:55, 12:95, 13:45, 14:30,
  15:80, 16:90, 17:100, 18:68, 19:75, 20:52
};

const DAYS_IN_MONTH = 31;
const START_DOW = 0; // March 1, 2026 = Sunday
const TODAY = 20;
const LABELS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

// ── Helpers ───────────────────────────────────────────────────────────
function pctColor(p) {
  if (p === undefined) return null;
  if (p >= 85) return { h:148, s:42, l:46 };
  if (p >= 65) return { h:148, s:30, l:38 };
  if (p >= 40) return { h:34,  s:38, l:42 };
  if (p >= 20) return { h:10,  s:30, l:40 };
  return             { h:220, s:12, l:26 };
}
function hsl({h,s,l}, a=1) { return `hsla(${h},${s}%,${l}%,${a})`; }

function calHeader() {
  return `<div class="cal-headers">${LABELS.map(d=>`<div class="cal-hd">${d}</div>`).join('')}</div>`;
}

function makeCells(renderFn) {
  let html = '<div class="cal">';
  // empty cells before day 1
  for (let i = 0; i < START_DOW; i++) html += '<div class="cell empty"></div>';
  for (let d = 1; d <= DAYS_IN_MONTH; d++) {
    const pct = scores[d];
    const future = d > TODAY;
    const today  = d === TODAY;
    const cls = ['cell', future ? 'future' : '', today ? 'today' : ''].filter(Boolean).join(' ');
    html += renderFn(d, pct, cls, future, today);
  }
  html += '</div>';
  return html;
}

// ── Concept 1 — Barres graduées ──────────────────────────────────────
function concept1() {
  const cells = makeCells((d, pct, cls, future) => {
    if (future || pct === undefined) {
      return `<div class="${cls}"><div class="dn">${d}</div></div>`;
    }
    const c = pctColor(pct);
    const barH = Math.round(pct * 0.65); // max 65% of cell height
    const barColor = hsl(c, 0.55);
    const textColor = hsl(c, 0.9);
    return `<div class="${cls}">
      <div class="bar-fill" style="height:${barH}%;background:${barColor};"></div>
      <div class="dn">${d}</div>
      <div class="bar-pct" style="color:${textColor};">${pct}%</div>
    </div>`;
  });
  return `<div class="cal-wrap">${calHeader()}${cells}</div>`;
}

// ── Concept 2 — Anneaux de complétion ────────────────────────────────
function concept2() {
  const R = 14, CX = 18, CY = 18, SIZE = 36;
  const CIRC = 2 * Math.PI * R;
  const cells = makeCells((d, pct, cls, future) => {
    if (future || pct === undefined) {
      return `<div class="${cls}"><div class="dn">${d}</div></div>`;
    }
    const c = pctColor(pct);
    const offset = CIRC * (1 - pct / 100);
    const ringColor = hsl(c, 0.9);
    const trackColor = hsl({h:220,s:12,l:22}, 1);
    const done = pct >= 85;
    return `<div class="${cls}">
      <div class="dn">${d}</div>
      <div class="ring-wrap">
        <svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}">
          <circle cx="${CX}" cy="${CY}" r="${R}" fill="none"
            stroke="${trackColor}" stroke-width="2.5"/>
          <circle cx="${CX}" cy="${CY}" r="${R}" fill="none"
            stroke="${ringColor}" stroke-width="2.5"
            stroke-dasharray="${CIRC.toFixed(1)}"
            stroke-dashoffset="${offset.toFixed(1)}"
            stroke-linecap="round"
            transform="rotate(-90 ${CX} ${CY})"/>
          ${done ? `<text x="${CX}" y="${CY+3.5}" text-anchor="middle"
            font-size="9" fill="${ringColor}" font-weight="800">✓</text>`
            : `<text x="${CX}" y="${CY+3.5}" text-anchor="middle"
            font-size="7.5" fill="${hsl(c,0.65)}" font-weight="700">${pct}%</text>`}
        </svg>
      </div>
    </div>`;
  });
  return `<div class="cal-wrap">${calHeader()}${cells}</div>`;
}

// ── Concept 3 — Météo émotionnelle ───────────────────────────────────
function concept3() {
  function weather(p) {
    if (p >= 90) return { icon:'☀️', label:'Parfait' };
    if (p >= 70) return { icon:'🌤', label:'Bien' };
    if (p >= 45) return { icon:'⛅', label:'Moyen' };
    if (p >= 20) return { icon:'🌧', label:'Difficile' };
    return               { icon:'🌩', label:'Raté' };
  }
  const cells = makeCells((d, pct, cls, future) => {
    if (future || pct === undefined) {
      return `<div class="${cls}"><div class="dn">${d}</div></div>`;
    }
    const w = weather(pct);
    return `<div class="${cls}">
      <div class="dn">${d}</div>
      <div class="weather-icon" title="${w.label} · ${pct}%">${w.icon}</div>
    </div>`;
  });
  return `<div class="cal-wrap">${calHeader()}${cells}</div>`;
}

// ── Concept 4 — Montagne en ascension ────────────────────────────────
function concept4() {
  const W = 580, H = 140, PAD_X = 20, PAD_Y = 16;
  const inner_w = W - PAD_X * 2;
  const inner_h = H - PAD_Y * 2;
  const totalDays = DAYS_IN_MONTH;
  const stepX = inner_w / (totalDays - 1);

  function xOf(d) { return PAD_X + (d - 1) * stepX; }
  function yOf(p) { return PAD_Y + inner_h * (1 - p / 100); }

  // Build path: days 1-20 with real data, 21-31 fade to unknown
  let pathData = '';
  let areaData = `M ${xOf(1)} ${H} L ${xOf(1)} ${yOf(scores[1])} `;

  for (let d = 1; d <= TODAY; d++) {
    const p = scores[d];
    const x = xOf(d), y = yOf(p);
    if (d === 1) { pathData += `M ${x} ${y} `; }
    else         { pathData += `L ${x} ${y} `; }
    if (d > 1)   { areaData += `L ${x} ${y} `; }
  }
  areaData += `L ${xOf(TODAY)} ${H} Z`;

  // Day ticks + today marker
  let ticks = '';
  for (let d = 1; d <= DAYS_IN_MONTH; d++) {
    const x = xOf(d);
    if (d % 5 === 0 || d === 1 || d === TODAY) {
      ticks += `<text x="${x}" y="${H - 2}" text-anchor="middle" font-size="8"
        fill="${d === TODAY ? '#5b5ef7' : '#8b96a8'}" font-weight="${d===TODAY?'700':'400'}">${d}</text>`;
    }
  }

  // Peak markers (≥ 95%)
  let peaks = '';
  for (let d = 1; d <= TODAY; d++) {
    const p = scores[d];
    if (p >= 95) {
      peaks += `<text x="${xOf(d)}" y="${yOf(p)-5}" text-anchor="middle" font-size="10">★</text>`;
    }
  }

  // Today marker
  const todayX = xOf(TODAY), todayY = yOf(scores[TODAY]);
  const todayMarker = `<circle cx="${todayX}" cy="${todayY}" r="4" fill="#5b5ef7"/>
    <circle cx="${todayX}" cy="${todayY}" r="7" fill="none" stroke="#5b5ef7" stroke-width="1.5" opacity=".5"/>`;

  // Future dotted line
  let futurePath = `M ${xOf(TODAY)} ${todayY}`;
  const futureTarget = PAD_Y + inner_h * 0.35; // optimistic target
  futurePath += ` Q ${xOf(26)} ${futureTarget - 20} ${xOf(DAYS_IN_MONTH)} ${futureTarget}`;

  // Y-axis labels
  const yLabels = [0, 50, 100].map(p =>
    `<text x="${PAD_X - 4}" y="${yOf(p) + 3}" text-anchor="end" font-size="8" fill="#8b96a8">${p}%</text>`
  ).join('');

  return `<div class="mountain-wrap">
    <div class="mountain-title">Mars 2026 — profil du mois</div>
    <svg class="mountain-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="mtn-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5b5ef7" stop-opacity=".5"/>
          <stop offset="100%" stop-color="#5b5ef7" stop-opacity=".04"/>
        </linearGradient>
        <linearGradient id="future-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#8b96a8" stop-opacity=".6"/>
          <stop offset="100%" stop-color="#8b96a8" stop-opacity=".15"/>
        </linearGradient>
      </defs>
      <!-- grid lines -->
      ${[0,25,50,75,100].map(p =>
        `<line x1="${PAD_X}" y1="${yOf(p)}" x2="${W-PAD_X}" y2="${yOf(p)}"
          stroke="#2d3147" stroke-width="1"/>`
      ).join('')}
      <!-- filled mountain area -->
      <path d="${areaData}" fill="url(#mtn-grad)"/>
      <!-- mountain line -->
      <path d="${pathData}" fill="none" stroke="#5b5ef7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <!-- future dotted line -->
      <path d="${futurePath}" fill="none" stroke="url(#future-grad)" stroke-width="1.5"
        stroke-dasharray="4 4" stroke-linecap="round"/>
      <!-- peak stars -->
      <g fill="#fbbf24" opacity=".85">${peaks}</g>
      <!-- today -->
      ${todayMarker}
      <!-- day labels -->
      ${ticks}
      <!-- y labels -->
      ${yLabels}
    </svg>
  </div>`;
}

// ── Concept 5 — Fond teinté + sceau discret ──────────────────────────
function concept5() {
  function stamp(p) {
    if (p >= 95) return { icon:'◆', cls:'stamp', color:'#fbbf24' };  // gold diamond
    if (p >= 85) return { icon:'◆', cls:'stamp', color:'#a5f3a0' };  // soft green diamond
    return null;
  }
  const cells = makeCells((d, pct, cls, future) => {
    if (future || pct === undefined) {
      return `<div class="${cls}"><div class="dn">${d}</div></div>`;
    }
    const c = pctColor(pct);
    const bgTint = hsl(c, 0.12);
    const borderTint = hsl(c, 0.35);
    const s = stamp(pct);
    const stampHtml = s ? `<div class="stamp" style="color:${s.color}">${s.icon}</div>` : '';
    return `<div class="${cls}" style="background:${bgTint};border-color:${borderTint};">
      <div class="dn">${d}</div>
      ${stampHtml}
    </div>`;
  });
  return `<div class="cal-wrap">${calHeader()}${cells}</div>`;
}

// ── Render all ────────────────────────────────────────────────────────
const concepts = [
  { n:'01', name:'Barres de remplissage graduées',   fn: concept1 },
  { n:'02', name:'Anneaux de complétion',            fn: concept2 },
  { n:'03', name:'Météo émotionnelle',               fn: concept3 },
  { n:'04', name:'Montagne en ascension',            fn: concept4 },
  { n:'05', name:'Fond teinté + sceau discret',      fn: concept5 },
];

const root = document.getElementById('root');
root.innerHTML = concepts.map(c => `
  <div class="concept">
    <div class="concept-label">
      <span class="concept-num">${c.n}</span>
      <span class="concept-name">${c.name}</span>
    </div>
    ${c.fn()}
  </div>
`).join('');
</script>
</body>
</html>
